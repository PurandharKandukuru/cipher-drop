<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A855F7"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
  </defs>
  <rect width="180" height="180" rx="28" fill="url(#bg)"/>
  <g transform="translate(90, 90)">
    <!-- Shield -->
    <path d="M0 -55 L50 -35 L50 15 C50 45 25 65 0 75 C-25 65 -50 45 -50 15 L-50 -35 Z" 
          fill="none" stroke="url(#purple)" stroke-width="6" stroke-linejoin="round"/>
    <!-- Lock body -->
    <rect x="-22" y="0" width="44" height="35" rx="4" fill="url(#purple)"/>
    <!-- Lock shackle -->
    <path d="M-12 0 L-12 -15 C-12 -30 0 -38 0 -38 C0 -38 12 -30 12 -15 L12 0" 
          fill="none" stroke="url(#purple)" stroke-width="6" stroke-linecap="round"/>
    <!-- Keyhole -->
    <circle cx="0" cy="14" r="6" fill="#1a1a2e"/>
    <rect x="-2" y="14" width="4" height="10" fill="#1a1a2e"/>
  </g>
</svg>
