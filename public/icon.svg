<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A855F7"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  
  <!-- Shield with lock -->
  <g filter="url(#glow)">
    <!-- Shield shape -->
    <path d="M256 80 L400 130 L400 260 C400 340 340 400 256 440 C172 400 112 340 112 260 L112 130 Z" 
          fill="none" stroke="url(#purple)" stroke-width="16" stroke-linejoin="round"/>
    
    <!-- Lock body -->
    <rect x="196" y="240" width="120" height="100" rx="12" fill="url(#purple)"/>
    
    <!-- Lock shackle -->
    <path d="M220 240 L220 200 C220 160 256 140 256 140 C256 140 292 160 292 200 L292 240" 
          fill="none" stroke="url(#purple)" stroke-width="16" stroke-linecap="round"/>
    
    <!-- Keyhole -->
    <circle cx="256" cy="280" r="16" fill="#1a1a2e"/>
    <rect x="250" y="280" width="12" height="30" fill="#1a1a2e"/>
  </g>
</svg>
