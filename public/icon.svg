<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Purple-to-Indigo Gradient for the Hexagon -->
    <linearGradient id="hex_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C084FC" />
      <stop offset="100%" stop-color="#6366F1" />
    </linearGradient>
    
    <!-- Cyan-to-Blue Gradient for the Arrowhead (Drop) -->
    <linearGradient id="arrow_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
  </defs>

  <!-- Clean dark card background (perfect for maskable app icons) -->
  <rect width="512" height="512" rx="128" fill="#09090B" stroke="#1F1A3A" stroke-width="6" />

  <!-- Hexagon border -->
  <polygon points="256,50 430,150 430,350 256,450 82,350 82,150" 
           fill="none" 
           stroke="url(#hex_grad)" 
           stroke-width="24" 
           stroke-linejoin="round" />

  <!-- Downward arrowhead inside representing download/drop -->
  <path d="M 180,180 L 256,256 L 332,180" 
        fill="none" 
        stroke="url(#arrow_grad)" 
        stroke-width="20" 
        stroke-linecap="round" 
        stroke-linejoin="round" />

  <!-- Lock shackle + body -->
  <path d="M 226,310 V 290 C 226,273 239,260 256,260 C 273,260 286,273 286,290 V 310" 
        fill="none" 
        stroke="#FFFFFF" 
        stroke-width="12" 
        stroke-linecap="round" />
        
  <rect x="206" y="306" width="100" height="70" rx="12" fill="#FFFFFF" />
  
  <!-- Keyhole cut out -->
  <circle cx="256" cy="336" r="8" fill="#09090B" />
  <path d="M 253,336 L 259,336 L 261,356 L 251,356 Z" fill="#09090B" />
</svg>
