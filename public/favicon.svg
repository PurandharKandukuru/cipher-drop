<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Purple-to-Indigo Gradient for the Hexagon -->
    <linearGradient id="hex_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C084FC" />
      <stop offset="100%" stop-color="#6366F1" />
    </linearGradient>
    
    <!-- Cyan-to-Blue Gradient for the Arrowhead (Drop) -->
    <linearGradient id="arrow_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
  </defs>

  <!-- Hexagon border (thickened for low-res favicon visibility) -->
  <polygon points="256,30 446,140 446,372 256,482 66,372 66,140" 
           fill="none" 
           stroke="url(#hex_grad)" 
           stroke-width="36" 
           stroke-linejoin="round" />

  <!-- Downward arrowhead inside representing download/drop -->
  <path d="M 160,170 L 256,266 L 352,170" 
        fill="none" 
        stroke="url(#arrow_grad)" 
        stroke-width="32" 
        stroke-linecap="round" 
        stroke-linejoin="round" />

  <!-- Lock shackle + body (thickened for low-res favicon visibility) -->
  <path d="M 216,310 V 280 C 216,258 234,240 256,240 C 278,240 296,258 296,280 V 310" 
        fill="none" 
        stroke="#FFFFFF" 
        stroke-width="20" 
        stroke-linecap="round" />
        
  <rect x="190" y="300" width="132" height="90" rx="16" fill="#FFFFFF" />
  
  <!-- Keyhole cut out -->
  <circle cx="256" cy="335" r="12" fill="#09090B" />
  <path d="M 251,335 L 261,335 L 264,365 L 248,365 Z" fill="#09090B" />
</svg>
